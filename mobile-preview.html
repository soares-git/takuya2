<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ表示プレビュー｜LP</title>
<style>
  body{margin:0;background:#e7ecf3;font-family:system-ui,sans-serif;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 12px 60px;}
  h1{font-size:15px;color:#445;margin:4px 0 0;font-weight:700;}
  p.note{font-size:12px;color:#6a7384;margin:0 0 6px;text-align:center;max-width:360px;line-height:1.6;}
  .phone{width:390px;max-width:100%;height:780px;border:11px solid #1c2438;border-radius:42px;
         box-shadow:0 18px 50px rgba(20,30,60,.28);overflow:hidden;background:#000;position:relative;}
  .phone::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
                 width:150px;height:26px;background:#1c2438;border-radius:0 0 16px 16px;z-index:2;}
  iframe{width:390px;height:780px;border:0;display:block;background:#fff;}
</style>
</head>
<body>
  <h1>📱 スマホ表示プレビュー（390px幅）</h1>
  <p class="note">下のフレーム内が、実機スマホで見たときのLPです。そのままスクロールして確認できます。</p>
  <div class="phone">
    <iframe src="LP.html" title="LP スマホ表示"></iframe>
  </div>
</body>
</html>
